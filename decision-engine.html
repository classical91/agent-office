// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmt(n, d=0) {
  if (isNaN(n) || !isFinite(n)) return '—';
  return Number(n).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
}
function pill(color, text) {
  return `<span class="pill-${color} text-xs font-mono px-2 py-0.5 rounded-sm tracking-wide">${text}</span>`;
}
function tagBadge(tag) {
  const t = TAG_STYLE[tag];
  if (!t) return '';
  return `<span style="background:${t.bg};color:${t.text};border:1px solid ${t.border}" class="text-xs font-mono px-1.5 py-0.5 rounded-sm">${tag}</span>`;
}

function checkItem(item, value, index, checkKey) {
  const isY = value === 'yes', isN = value === 'no', isS = value === 'skip';
  const rowClass = isY ? 'row-yes' : isN ? 'row-no' : '';
  const boxClass = isY ? 'check-yes' : isN ? 'check-no' : isS ? 'check-skip' : 'border border-zinc-700 text-zinc-700';
  const boxContent = isY ? '✓' : isN ? '✕' : isS ? '—' : index;
  const yClass = isY ? 'btn-yes-active' : 'border border-zinc-800 text-zinc-600 hover:border-emerald-800';
  const nClass = isN ? 'btn-no-active' : 'border border-zinc-800 text-zinc-600 hover:border-red-900';
  const sClass = isS ? 'btn-skip-active' : 'border border-zinc-800 text-zinc-600 hover:border-zinc-600';
  const highWt = item.weight >= 4 ? '<span class="text-xs font-mono text-amber-600/80 ml-1">HIGH WT</span>' : '';
  const tagHtml = item.tag ? tagBadge(item.tag) : '';
  return `
    <div class="border-b border-zinc-800/40 last:border-0 transition-all ${rowClass}" data-item-id="${item.id}" data-check-key="${checkKey}">
      <div class="flex items-start gap-3 px-4 py-3">
        <div class="flex-shrink-0 w-6 pt-0.5">
          <div class="w-5 h-5 rounded-sm flex items-center justify-center text-xs font-mono transition-all ${boxClass}">${boxContent}</div>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            ${tagHtml}
            <span class="text-xs font-mono ${isY?'text-zinc-200':isN?'text-zinc-500':'text-zinc-300'}">${item.label}</span>
            ${highWt}
          </div>
          ${item.hint ? `<div class="text-xs font-mono text-zinc-700 mt-0.5 leading-relaxed">${item.hint}</div>` : ''}
        </div>
        <div class="flex gap-1 flex-shrink-0 mt-0.5">
          <button class="px-2 py-1 text-xs font-mono rounded-sm transition-all ${yClass}" data-action="check" data-id="${item.id}" data-val="yes" data-key="${checkKey}">YES</button>
          <button class="px-2 py-1 text-xs font-mono rounded-sm transition-all ${nClass}" data-action="check" data-id="${item.id}" data-val="no" data-key="${checkKey}">NO</button>
          <button class="px-2 py-1 text-xs font-mono rounded-sm transition-all ${sClass}" data-action="check" data-id="${item.id}" data-val="skip" data-key="${checkKey}">—</button>
        </div>
      </div>
    </div>`;
}

function groupHeader(id, label, sub, yes, total, collapsed) {
  const arrow = collapsed ? '▶' : '▼';
  return `
    <button class="w-full flex items-center justify-between px-4 py-3 hover:bg-zinc-900/50 transition-all border-b border-zinc-800/50" data-action="toggle-group" data-group="${id}">
      <div class="text-left flex-1 min-w-0">
        <div class="text-xs font-mono font-semibold text-zinc-200 tracking-wide">${label}</div>
        ${sub ? `<div class="text-xs font-mono text-zinc-600 mt-0.5 hidden sm:block truncate">${sub}</div>` : ''}
      </div>
      <div class="flex items-center gap-3 ml-3 flex-shrink-0">
        <span class="text-xs font-mono text-emerald-500">${yes}</span>
        <span class="text-xs font-mono text-zinc-700">/</span>
        <span class="text-xs font-mono text-zinc-500">${total}</span>
        <span class="text-xs font-mono text-zinc-600">${arrow}</span>
      </div>
    </button>`;
}

function linkDropdown(groupId, label, links) {

function buildTopDown() {
  const s = state.td;
  const step = state.tdStep;
  const uc = parseFloat(s.usdt_change);
  const ro = s.usdt_above_ema===true && uc>0.75;
  const rn = s.usdt_above_ema===false && uc<-0.25;
  const ms = s.blackout?'BLACKOUT':ro?'RISK_OFF':rn?'RISK_ON':'NEUTRAL';
  const msc = s.blackout?0:rn?20:ro?0:10;
  const mc = ({RISK_ON:'green',RISK_OFF:'red',NEUTRAL:'amber',BLACKOUT:'amber'})[ms];
  const mv = ({RISK_OFF:'No longs. Shorts only. 50% size.',RISK_ON:'Longs preferred. Full size.',NEUTRAL:'Longs OK. 75% size.',BLACKOUT:'Stand aside.'})[ms];
  const adx = parseFloat(s.adx);
  let regime='UNCLASSIFIED', rc='gray';
  if(s.atr_state==='high'){regime='VOLATILE EXPANSION';rc='amber';}
  else if(s.atr_state==='low'){regime='COMPRESSION';rc='gray';}
  else if(adx>25&&s.price_ema50==='above'&&s.ema50_ema200==='above'){regime='TREND UP';rc='green';}
  else if(adx>25&&s.price_ema50==='below'&&s.ema50_ema200==='below'){regime='TREND DOWN';rc='red';}
  else if(adx<20){regime='RANGE';rc='blue';}
  const b3 = s.daily_ema200==='above'&&s.ema50_cross===true&&s.structure==='HL';
  const be3 = s.daily_ema200==='below'&&s.ema50_cross===false&&s.structure==='LH';
  const bl = b3?'BULLISH':be3?'BEARISH':'NEUTRAL';
  const bsc = (b3||be3)?30:15;
  const bc = ({BULLISH:'green',BEARISH:'red',NEUTRAL:'amber'})[bl];
  const fired = [s.trend,s.momentum,s.reversal,s.participation,s.volatility].filter(v=>v===true).length;
  const sigsc = fired>=3?20:fired===2?10:0;
  const volsc = s.participation===true?15:s.participation===false?0:7;
  const atsc = s.volatility===true?10:0;
  const fsc = s.cipher==='accum'?5:0;
  const conf = Math.min(100,bsc+msc+sigsc+volsc+atsc+fsc);
  const sco = conf>=80?'#10b981':conf>=65?'#f59e0b':'#ef4444';
  const sm = conf>=80?1:conf>=65?0.5:conf>=50?0.25:0;
  const bal=parseFloat(s.balance), rf=parseFloat(s.risk)/100, av=parseFloat(s.atr_val), ep=parseFloat(s.entry);
  const ev = !!(bal&&av&&ep&&s.dir&&sm>0);
  const ra=ev?bal*rf*sm:0, sd=ev?1.5*av:0, ps=ev?ra/sd:0;
  const sp=ev?(s.dir==='long'?ep-sd:ep+sd):0;
  const t1=ev?(s.dir==='long'?ep+1.5*sd:ep-1.5*sd):0;
  const t2=ev?(s.dir==='long'?ep+2.5*sd:ep-2.5*sd):0;
  const cc = {green:'text-emerald-400',red:'text-red-400',amber:'text-amber-400',blue:'text-sky-400',gray:'text-zinc-500'};

  const steps = [
    {id:1,label:'Macro',dot:ms==='RISK_ON'?'#10b981':ms==='RISK_OFF'?'#ef4444':'#f59e0b'},
    {id:2,label:'Regime',dot:rc==='green'?'#10b981':rc==='red'?'#ef4444':rc==='blue'?'#38bdf8':'#f59e0b'},

    {id:4,label:'Signals',dot:fired>=3?'#10b981':fired>=2?'#f59e0b':'#ef4444'},
    {id:5,label:'Score',dot:conf>=80?'#10b981':conf>=65?'#f59e0b':'#ef4444'},
    {id:6,label:'Execute',dot:ev?'#10b981':'#52525b'},
  ];

  function ct(key, tl, fl) {
    const val = key.includes('.') ? s[key.split('.')[1]] : s[key];
    const yA = val===true?'bg-emerald-900/50 text-emerald-300 border-emerald-700':'bg-zinc-900 text-zinc-600 border-zinc-800 hover:border-zinc-600';
    const nA = val===false?'bg-red-900/50 text-red-300 border-red-700':'bg-zinc-900 text-zinc-600 border-zinc-800 hover:border-zinc-600';
    return `<div class="flex gap-1">
      <button class="px-2.5 py-1 text-xs font-mono rounded-sm border transition-all ${yA}" data-action="set-td" data-key="${key}" data-value="true">${tl}</button>
      <button class="px-2.5 py-1 text-xs font-mono rounded-sm border transition-all ${nA}" data-action="set-td" data-key="${key}" data-value="false">${fl}</button>
    </div>`;
  }
  function mu(key, opts) {
    const val = s[key];
    return `<div class="flex flex-wrap gap-1">${opts.map(o=>`<button class="px-2.5 py-1 text-xs font-mono rounded-sm border transition-all ${val===o.v?'bg-zinc-700 text-zinc-100 border-zinc-500':'bg-zinc-900 text-zinc-600 border-zinc-800 hover:border-zinc-600'}" data-action="set-td" data-key="${key}" data-value="${o.v}">${o.l}</button>`).join('')}</div>`;

    return `<input value="${s[key]||''}" placeholder="${placeholder}" class="w-28 bg-zinc-900 border border-zinc-700 text-zinc-200 text-xs font-mono px-2 py-1.5 rounded-sm focus:outline-none focus:border-zinc-500 placeholder-zinc-800" data-action="set-td-input" data-key="${key}"/>`;

    </div>

  if (step===5) {
    const scoreBreakdown = [{label:'HTF Trend Alignment',pts:bsc,max:30},{label:'Macro Filter',pts:msc,max:20},{label:'Signal Confluence',pts:sigsc,max:20},{label:'Volume Confirmation',pts:volsc,max:15},{label:'Volatility',pts:atsc,max:10},{label:'Funding / Cipher',pts:fsc,max:5}];

      ${scoreBreakdown.map(item=>`
        <div class="flex items-center justify-between gap-4 px-4 py-2.5 border-b border-zinc-800/40 last:border-0">
          <div class="text-xs text-zinc-300 font-mono">${item.label}</div>
          <div class="flex items-center gap-3">
            <div class="w-20 h-1.5 bg-zinc-800 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${(item.pts/item.max)*100}%;background:${sco}"></div></div>
            <span class="text-xs font-mono text-zinc-400 w-12 text-right">${item.pts}/${item.max}</span>

    <div class="p-4 rounded-sm border border-zinc-800 bg-zinc-950 mb-3">
      <div class="flex justify-between items-baseline mb-3"><span class="text-xs font-mono text-zinc-600">TOTAL</span><span class="text-xs font-mono" style="color:${sco}">${conf>=80?'FULL SIZE':conf>=65?'HALF SIZE':conf>=50?'25% SIZE':'NO TRADE'}</span></div>
      <div class="text-5xl font-mono font-bold mb-3" style="color:${sco}">${conf}<span class="text-lg text-zinc-700 ml-1">/ 100</span></div>
      <div class="h-1.5 bg-zinc-800 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${conf}%;background:${sco}"></div></div>
    </div>
    <div class="flex gap-2">
      <button class="flex-1 py-2.5 text-xs font-mono text-zinc-600 border border-zinc-800 rounded-sm hover:bg-zinc-900" data-action="td-step" data-step="4">SIGNALS</button>
      <button class="flex-1 py-2.5 text-xs font-mono border rounded-sm transition-all ${conf>=65?'text-zinc-400 border-zinc-700 hover:bg-zinc-900':'text-zinc-700 border-zinc-800 cursor-not-allowed'}" ${conf<50?'disabled':''} data-action="td-step" data-step="6">${conf>=65?'EXECUTE':'SCORE TOO LOW'}</button>
    </div>`;
  }

  if (step===6) stepContent = `
    <div class="text-xs font-mono text-zinc-600 mb-3 tracking-widest">STEP 06 / EXECUTION</div>
    <div class="rounded-sm border border-zinc-800 bg-zinc-950/80 mb-3">
      <div class="flex items-center justify-between px-4 py-2.5 border-b border-zinc-800/80"><span class="text-xs font-mono text-zinc-600 tracking-widest">TRADE PARAMETERS</span>${pill(conf>=80?'green':'amber','SCORE '+conf)}</div>
      ${row('Direction','',mu('dir',[{l:'LONG',v:'long'},{l:'SHORT',v:'short'}]))}
      ${row('Account balance','',fld('balance','e.g. 10000'))}
      ${row('Risk %','',mu('risk',[{l:'1%',v:'1'},{l:'1.5%',v:'1.5'},{l:'2%',v:'2'}]))}
      ${row('ATR(14) value','',fld('atr_val','e.g. 1250'))}
      ${row('Entry price','',fld('entry','e.g. 87000'))}
    </div>
    ${ev ? `<div class="grid grid-cols-2 gap-px border border-zinc-800 rounded-sm overflow-hidden bg-zinc-800 mb-3">
      ${[{l:'POSITION SIZE',v:ps.toFixed(5)+' BTC',c:'text-zinc-100'},{l:'RISK AMOUNT',v:'$'+fmt(ra,2),c:'text-zinc-100'},{l:'STOP LOSS',v:'$'+fmt(sp,0),c:'text-red-400'},{l:'STOP DIST',v:'$'+fmt(sd,0)+' (1.5x ATR)',c:'text-zinc-500'},{l:'TP1 1.5R (40%)',v:'$'+fmt(t1,0),c:'text-emerald-400'},{l:'TP2 2.5R (40%)',v:'$'+fmt(t2,0),c:'text-emerald-300'},{l:'RUNNER (20%)',v:'Trail 1x ATR after TP2',c:'text-sky-400'},{l:'SIZE MULT',v:(sm*100).toFixed(0)+'%',c:'text-amber-400'}].map(item=>`<div class="bg-zinc-950 px-3 py-3"><div class="text-xs font-mono text-zinc-700">${item.l}</div><div class="text-sm font-mono font-semibold mt-1 ${item.c}">${item.v}</div></div>`).join('')}
    </div>` : ''}
    <button class="w-full py-2.5 text-xs font-mono text-zinc-600 border border-zinc-800 rounded-sm hover:bg-zinc-900" data-action="td-reset">RESET — NEW ANALYSIS</button>`;

  return `
    <div class="flex gap-px mb-6 rounded-sm overflow-hidden border border-zinc-800/50">

        <div class="flex items-center gap-1.5 mb-1"><div class="w-1.5 h-1.5 rounded-full" style="background:${st.dot}"></div><span class="text-xs font-mono text-zinc-600">${String(st.id).padStart(2,'0')}</span></div>

// ── MAIN APP ──────────────────────────────────────────────────────────────────

function buildApp() {
  const cur = VIEWS.find(v=>v.id===state.view)||VIEWS[0];
  let content = '';
  if (state.view==='home') content = buildHome();
  else if (state.view==='markettd') content = buildMarketTopDown();
  else if (state.view==='bottomup') content = buildBottomUp();
  else if (state.view==='btcstrat') content = buildBTCStrategy();
  else if (state.view==='altres') content = buildAltResearch();
  else if (state.view==='drafting') content = buildDrafting();

  const menuHtml = state.menuOpen ? `
    <div class="border-t border-zinc-800/50" style="background:#09090b;">
      <div class="max-w-2xl mx-auto px-4 py-2 flex flex-wrap gap-1">
        ${VIEWS.map(v=>`<button class="px-3 py-1.5 text-xs font-mono rounded-sm border transition-all ${state.view===v.id?'bg-zinc-800 text-zinc-100 border-zinc-600':'border-zinc-800 text-zinc-600 hover:border-zinc-600 hover:text-zinc-400'}" data-action="nav" data-view="${v.id}">${v.label}</button>`).join('')}
      </div>
    </div>` : '';

  return `
    <div class="min-h-screen" style="background:#09090b;color:#e4e4e7;">
      <div class="sticky top-0 z-50 border-b border-zinc-800/80" style="background:rgba(9,9,11,0.95);backdrop-filter:blur(8px);">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
          <div class="flex items-center gap-3">
            ${state.view!=='home'?`<button class="text-xs font-mono text-zinc-600 hover:text-zinc-400 transition-all" data-action="nav" data-view="home">←</button>`:''}
            <div>
              <div class="flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full" style="background:${cur.dot}"></div><span class="text-xs font-mono font-semibold text-zinc-200 tracking-wide">${cur.label}</span></div>
            </div>
          </div>
          <button class="text-xs font-mono text-zinc-600 hover:text-zinc-400 transition-all px-2 py-1 border border-zinc-800 rounded-sm" data-action="toggle-menu">MENU</button>
        </div>
        ${menuHtml}
      </div>
      <div class="max-w-2xl mx-auto px-4 py-6">${content}</div>
    </div>`;
}

// ── EVENTS ────────────────────────────────────────────────────────────────────

function attachEvents() {
  document.addEventListener('click', handleClick, {once:true});
  document.addEventListener('input', handleInput, {once:true});
}

function handleClick(e) {
  const el = e.target.closest('[data-action]');
  if (!el) { attachEvents(); return; }
  const action = el.dataset.action;
  if (action==='nav') { state.view=el.dataset.view; state.menuOpen=false; render(); return; }
  if (action==='toggle-menu') { state.menuOpen=!state.menuOpen; render(); return; }
  if (action==='toggle-group') {
    const g = el.dataset.group;
    state.collapsed[g] = state.collapsed[g]===false ? true : false;
    render(); return;
  }
  if (action==='toggle-link') {
    const g = el.dataset.linkgroup;
    state.linkOpen[g] = !state.linkOpen[g];
    render(); return;
  }
  if (action==='toggle-cu') { state.cuOpen=!state.cuOpen; render(); return; }
  if (action==='toggle-drafts') { state.draftsOpen=!state.draftsOpen; render(); return; }
  if (action==='add-draft') { state.drafts.push({id:Date.now(),text:'',done:false}); render(); return; }
  if (action==='toggle-draft') {
    const id=parseInt(el.dataset.draftid);
    const d=state.drafts.find(x=>x.id===id);
    if(d) d.done=!d.done;
    render(); return;
  }
  if (action==='remove-draft') {
    const id=parseInt(el.dataset.draftid);
    state.drafts=state.drafts.filter(x=>x.id!==id);
    render(); return;
  }
  if (action==='check') {
    const {id,val,key} = el.dataset;
    if (state[key][id]===val) state[key][id]=null; else state[key][id]=val;
    render(); return;
  }
  if (action==='set-filter') { state[el.dataset.filterkey]=el.dataset.filterval; render(); return; }
  if (action==='reset-checks') {
    const k = el.dataset.filterkey;
    if (k==='filter') state.checks={};
    else if (k==='altFilter') state.altChecks={};
    render(); return;
  }
  if (action==='set-td') {
    const {key,value} = el.dataset;
    state.td[key] = value==='true'?true:value==='false'?false:value;
    render(); return;
  }
  if (action==='td-step') {
    const s=parseInt(el.dataset.step);
    if(!isNaN(s)) { state.tdStep=s; render(); return; }
  }
  if (action==='td-reset') {
    state.td={usdt_above_ema:null,usdt_change:'',btc_d_rising:null,total_bull:null,dxy_bull:null,blackout:false,adx:'',price_ema50:null,ema50_ema200:null,atr_state:null,daily_ema200:null,ema50_cross:null,structure:null,trend:null,momentum:null,reversal:null,participation:null,volatility:null,cipher:null,balance:'',risk:'1',atr_val:'',entry:'',dir:null};
    state.tdStep=1;
    render(); return;
  }
  if (action==='clear-token') { state.altToken=''; state.altChecks={}; render(); return; }
  attachEvents();
}

function handleInput(e) {
  const el = e.target;
  const action = el.dataset.action;
  if (action==='set-td-input') {
    state.td[el.dataset.key] = el.value;
    // don't re-render on every keystroke, just update state
    attachEvents(); return;
  }
  if (action==='edit-draft') {
    const id=parseInt(el.dataset.draftid);
    const d=state.drafts.find(x=>x.id===id);
    if(d) d.text=el.value;
    attachEvents(); return;
  }
  if (action==='set-token') {
    state.altToken = el.value.toUpperCase();
    attachEvents(); return;
  }
  attachEvents();
}

// Fire it up
render();
</script>
