<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Builder</title>

  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #020617;
      --border: #1f2937;
      --border-2: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --green: #10b981;
      --red: #dc2626;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, system-ui, -apple-system, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: 1fr 400px;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "header  sidebar"
        "builder sidebar";
      min-height: 100vh;
    }

    .topbar-wrap {
      grid-area: header;
      padding: 32px 32px 0;
      max-width: 760px;
    }

    .builder {
      grid-area: builder;
      padding: 24px 32px 32px;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      /* Push the form card to the bottom of the page. */
      justify-content: flex-end;
    }

    .sidebar {
      background: var(--panel-2);
      border-left: 1px solid #1e293b;
      padding: 24px;
      overflow-y: auto;
      max-height: 100vh;
      position: sticky;
      top: 0;
    }

    h1, h2 {
      margin-top: 0;
    }

    .topbar h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding: 9px 14px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border-2);
      border-radius: 12px;
      transition: background .15s ease, color .15s ease, border-color .15s ease;
    }
    .back-link:hover {
      background: #1e293b;
      color: var(--text);
      border-color: var(--border-2);
    }
    .back-link .arrow { font-size: 16px; line-height: 1; }

    .topbar .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin: 4px 0 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 20px 40px rgba(0,0,0,.25);
    }

    label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field {
      margin-bottom: 16px;
    }

    input, textarea {
      width: 100%;
      background: var(--panel-2);
      color: #f8fafc;
      border: 1px solid var(--border-2);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.55;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      color: white;
      background: var(--accent);
      transition: background .15s ease, transform .05s ease;
    }

    button:hover { background: var(--accent-hover); }
    button:active { transform: translateY(1px); }

    .secondary { background: #334155; }
    .secondary:hover { background: #475569; }
    .danger { background: var(--red); }
    .danger:hover { background: #b91c1c; }
    .ghost {
      background: transparent;
      border: 1px solid var(--border-2);
      color: var(--muted);
    }
    .ghost:hover { background: #1e293b; }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .actions .spacer { flex: 1; }

    .editing-badge {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #fbbf24;
      background: rgba(120, 53, 15, .35);
      border: 1px solid rgba(245, 158, 11, .4);
      border-radius: 999px;
      padding: 6px 12px;
    }
    .editing-badge.show { display: inline-flex; }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .sidebar-head h2 { margin: 0; font-size: 18px; }

    .count-pill {
      font-size: 12px;
      color: var(--muted);
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 999px;
      padding: 4px 10px;
    }

    .search { margin-bottom: 16px; }
    .search input { font-size: 14px; padding: 10px 12px; }

    .saved-item {
      background: var(--panel);
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      transition: border-color .15s ease;
    }
    .saved-item:hover { border-color: var(--border-2); }
    .saved-item.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

    /* name + subtitle on the left, Copy button beside it */
    .saved-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .saved-info { min-width: 0; flex: 1; }

    .saved-info h3 {
      margin: 0 0 2px;
      font-size: 16px;
      word-break: break-word;
    }

    .saved-info .sub {
      margin: 0;
      font-size: 13px;
      font-style: italic;
      color: var(--muted);
      word-break: break-word;
    }

    .copy-btn {
      flex-shrink: 0;
      padding: 8px 14px;
      font-size: 13px;
    }
    .copy-btn.done { background: var(--green); }

    .saved-sub-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .saved-sub-actions button {
      padding: 6px 10px;
      font-size: 12px;
      flex: 1;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 24px 8px;
      border: 1px dashed #1e293b;
      border-radius: 14px;
    }

    .io-row { display: flex; gap: 8px; margin-top: 18px; }
    .io-row button { flex: 1; font-size: 12px; padding: 9px 10px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e293b;
      border: 1px solid var(--border-2);
      color: #f8fafc;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 12px 30px rgba(0,0,0,.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        grid-template-areas:
          "header"
          "sidebar"
          "builder";
      }
      .sidebar {
        border-left: none;
        border-top: 1px solid #1e293b;
        position: static;
        max-height: none;
      }
      .topbar-wrap { padding: 20px 20px 0; }
      .builder {
        padding: 16px 20px 20px;
        /* Card already sits last in the stack on narrow screens. */
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar-wrap">
      <a class="back-link" href="/"><span class="arrow">&#8592;</span> Back to Agent Office</a>
      <div class="topbar">
        <h1>Prompt Builder</h1>
        <div class="subtitle">Save a prompt with a name, a subtitle, and its instructions — then copy it anytime.</div>
      </div>
    </header>

    <main class="builder">
      <div class="card">
        <div class="field">
          <label for="promptName">Prompt Name</label>
          <input id="promptName" placeholder="Example: Crypto News Brief" autocomplete="off" />
        </div>

        <div class="field">
          <label for="subtitle">Subtitle <span style="font-style:italic;">(shown in italics)</span></label>
          <input id="subtitle" placeholder="Example: A daily 10-item market digest" autocomplete="off" />
        </div>

        <div class="field">
          <label for="instructions">Instructions</label>
          <textarea id="instructions" placeholder="Write the prompt instructions here..."></textarea>
        </div>

        <div class="actions">
          <button id="saveBtn" onclick="savePrompt()">Save Prompt</button>
          <button class="secondary" onclick="copyCurrent()">Copy</button>
          <span class="editing-badge" id="editingBadge">
            Editing
            <button class="ghost" style="padding:2px 8px;font-size:11px;" onclick="cancelEdit()">New</button>
          </span>
          <span class="spacer"></span>
          <button class="danger" onclick="clearForm()">Clear</button>
        </div>
      </div>
    </main>

    <aside class="sidebar">
      <div class="sidebar-head">
        <h2>Saved Prompts</h2>
        <span class="count-pill" id="savedCount">0</span>
      </div>

      <div class="search">
        <input id="searchBox" placeholder="Search saved prompts..." oninput="renderSavedPrompts()" autocomplete="off" />
      </div>

      <div id="savedPrompts"></div>

      <div class="io-row">
        <button class="ghost" onclick="exportPrompts()">Export</button>
        <button class="ghost" onclick="document.getElementById('importFile').click()">Import</button>
        <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importPrompts(event)" />
      </div>
    </aside>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    "use strict";

    const STORAGE_KEY = "savedPrompts";
    const API_BASE = "/api/prompts";
    let savedPrompts = loadSaved();
    let editingId = null;
    // When the backend is reachable, prompts sync across devices via the API.
    // localStorage is kept as an offline cache / fallback.
    let apiOnline = false;

    async function apiList() {
      const res = await fetch(API_BASE, { headers: { "Accept": "application/json" } });
      if (!res.ok) throw new Error("Failed to load prompts");
      return res.json();
    }
    async function apiCreate(data) {
      const res = await fetch(API_BASE, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error("Failed to save prompt");
      return res.json();
    }
    async function apiUpdate(id, data) {
      const res = await fetch(API_BASE + "/" + encodeURIComponent(id), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error("Failed to update prompt");
      return res.json();
    }
    async function apiDelete(id) {
      const res = await fetch(API_BASE + "/" + encodeURIComponent(id), { method: "DELETE" });
      if (!res.ok) throw new Error("Failed to delete prompt");
      return res.json();
    }

    function loadSaved() {
      try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return Array.isArray(raw) ? raw : [];
      } catch (e) {
        return [];
      }
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(savedPrompts));
    }

    function $(id) { return document.getElementById(id); }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    // The instructions are the prompt body that gets copied.
    function promptBody(item) {
      return item.instructions != null ? item.instructions : (item.prompt || "");
    }

    async function savePrompt() {
      const name = $("promptName").value.trim() || "Untitled Prompt";
      const subtitle = $("subtitle").value.trim();
      const instructions = $("instructions").value.trim();

      if (!instructions) {
        toast("Add some instructions before saving.", "error");
        return;
      }

      const data = { name, subtitle, instructions };

      // Update an existing prompt.
      if (editingId !== null) {
        if (apiOnline) {
          try {
            const updated = await apiUpdate(editingId, data);
            const idx = savedPrompts.findIndex(p => p.id === editingId);
            if (idx !== -1) savedPrompts[idx] = updated;
            else savedPrompts.unshift(updated);
            persist();
            renderSavedPrompts();
            toast("Prompt updated.", "success");
            return;
          } catch (e) {
            toast("Couldn't reach the server — saved locally.", "error");
          }
        }
        const idx = savedPrompts.findIndex(p => p.id === editingId);
        if (idx !== -1) {
          savedPrompts[idx] = {
            ...savedPrompts[idx],
            name, subtitle, instructions,
            updatedAt: new Date().toISOString()
          };
          persist();
          renderSavedPrompts();
          if (!apiOnline) toast("Prompt updated.", "success");
          return;
        }
      }

      // Create a new prompt.
      if (apiOnline) {
        try {
          const created = await apiCreate(data);
          savedPrompts.unshift(created);
          editingId = created.id;
          persist();
          renderSavedPrompts();
          updateEditingBadge();
          toast("Prompt saved.", "success");
          return;
        } catch (e) {
          toast("Couldn't reach the server — saved locally.", "error");
        }
      }

      const entry = {
        id: "local-" + Date.now(),
        name, subtitle, instructions,
        createdAt: new Date().toISOString()
      };
      savedPrompts.unshift(entry);
      editingId = entry.id;
      persist();
      renderSavedPrompts();
      updateEditingBadge();
      if (!apiOnline) toast("Prompt saved.", "success");
    }

    function renderSavedPrompts() {
      const container = $("savedPrompts");
      const query = $("searchBox").value.trim().toLowerCase();
      container.innerHTML = "";
      $("savedCount").textContent = savedPrompts.length;

      const list = query
        ? savedPrompts.filter(p =>
            (p.name || "").toLowerCase().includes(query) ||
            (p.subtitle || "").toLowerCase().includes(query) ||
            promptBody(p).toLowerCase().includes(query))
        : savedPrompts;

      if (list.length === 0) {
        container.innerHTML = savedPrompts.length === 0
          ? '<div class="empty">No saved prompts yet.<br />Fill in the form and hit Save.</div>'
          : '<div class="empty">No matches for your search.</div>';
        return;
      }

      list.forEach(item => {
        const div = document.createElement("div");
        div.className = "saved-item" + (item.id === editingId ? " active" : "");

        const subHtml = item.subtitle
          ? `<p class="sub">${escapeHtml(item.subtitle)}</p>`
          : "";

        div.innerHTML = `
          <div class="saved-top">
            <div class="saved-info">
              <h3>${escapeHtml(item.name || "Untitled Prompt")}</h3>
              ${subHtml}
            </div>
            <button class="copy-btn" onclick="copySaved('${item.id}', this)">Copy</button>
          </div>
          <div class="saved-sub-actions">
            <button class="secondary" onclick="loadPrompt('${item.id}')">Edit</button>
            <button class="danger" onclick="deletePrompt('${item.id}')">Delete</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function loadPrompt(id) {
      const item = savedPrompts.find(p => p.id === id);
      if (!item) return;
      $("promptName").value = item.name || "";
      $("subtitle").value = item.subtitle || "";
      $("instructions").value = promptBody(item);
      editingId = id;
      updateEditingBadge();
      renderSavedPrompts();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function deletePrompt(id) {
      const item = savedPrompts.find(p => p.id === id);
      if (!item) return;
      if (!confirm("Delete \"" + (item.name || "Untitled Prompt") + "\"?")) return;

      let ok = true;
      if (apiOnline) {
        try {
          await apiDelete(id);
        } catch (e) {
          ok = false;
          toast("Couldn't reach the server — deleted locally.", "error");
        }
      }

      savedPrompts = savedPrompts.filter(p => p.id !== id);
      if (editingId === id) { editingId = null; updateEditingBadge(); }
      persist();
      renderSavedPrompts();
      if (ok) toast("Prompt deleted.", "success");
    }

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (e) {
        try {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          return true;
        } catch (err) {
          return false;
        }
      }
    }

    async function copyCurrent() {
      const text = $("instructions").value.trim();
      if (!text) { toast("Nothing to copy yet.", "error"); return; }
      const ok = await copyToClipboard(text);
      toast(ok ? "Copied to clipboard." : "Copy failed.", ok ? "success" : "error");
    }

    async function copySaved(id, btn) {
      const item = savedPrompts.find(p => p.id === id);
      if (!item) return;
      const ok = await copyToClipboard(promptBody(item));
      if (ok && btn) {
        const original = btn.textContent;
        btn.textContent = "Copied!";
        btn.classList.add("done");
        setTimeout(() => { btn.textContent = original; btn.classList.remove("done"); }, 1200);
      }
      toast(ok ? "Copied to clipboard." : "Copy failed.", ok ? "success" : "error");
    }

    function clearForm() {
      $("promptName").value = "";
      $("subtitle").value = "";
      $("instructions").value = "";
      editingId = null;
      updateEditingBadge();
    }

    function cancelEdit() {
      editingId = null;
      updateEditingBadge();
      renderSavedPrompts();
    }

    function updateEditingBadge() {
      const badge = $("editingBadge");
      const saveBtn = $("saveBtn");
      if (editingId !== null) {
        badge.classList.add("show");
        saveBtn.textContent = "Update Prompt";
      } else {
        badge.classList.remove("show");
        saveBtn.textContent = "Save Prompt";
      }
    }

    function exportPrompts() {
      if (savedPrompts.length === 0) { toast("No prompts to export.", "error"); return; }
      const blob = new Blob([JSON.stringify(savedPrompts, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "prompts-" + new Date().toISOString().slice(0, 10) + ".json";
      a.click();
      URL.revokeObjectURL(url);
      toast("Exported " + savedPrompts.length + " prompt(s).", "success");
    }

    function importPrompts(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async e => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) throw new Error("bad format");
          let added = 0;
          for (const p of data) {
            if (!p || !(p.name || p.instructions || p.prompt)) continue;
            const payload = {
              name: String(p.name || "Untitled Prompt"),
              subtitle: String(p.subtitle || ""),
              instructions: String(p.instructions != null ? p.instructions : (p.prompt || "")),
            };
            if (!payload.instructions.trim()) continue;
            if (apiOnline) {
              try {
                const created = await apiCreate(payload);
                savedPrompts.unshift(created);
                added++;
              } catch (err) {
                // Skip prompts that fail to upload; keep importing the rest.
              }
            } else {
              savedPrompts.unshift({
                id: "local-" + Date.now() + "-" + Math.floor(Math.random() * 1000),
                ...payload,
                createdAt: new Date().toISOString()
              });
              added++;
            }
          }
          persist();
          renderSavedPrompts();
          toast("Imported " + added + " prompt(s).", "success");
        } catch (err) {
          toast("Invalid file.", "error");
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    }

    let toastTimer;
    function toast(message, type) {
      const el = $("toast");
      el.textContent = message;
      el.className = "toast show" + (type ? " " + type : "");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        el.className = "toast" + (type ? " " + type : "");
      }, 2000);
    }

    document.addEventListener("keydown", e => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
        e.preventDefault();
        savePrompt();
      }
    });

    async function init() {
      // Show cached prompts instantly, then sync from the server so the
      // list matches what was saved on other devices.
      renderSavedPrompts();
      updateEditingBadge();
      try {
        const remote = await apiList();
        savedPrompts = Array.isArray(remote) ? remote : [];
        apiOnline = true;
        persist();
        renderSavedPrompts();
      } catch (e) {
        apiOnline = false;
        // Server unreachable — stay in local-only mode using cached prompts.
      }
    }

    init();
  </script>
</body>
</html>
